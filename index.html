<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CS2 Steam Profile Stats</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page">
      <form class="profile-form" id="profileForm" autocomplete="off">
        <label class="visually-hidden" for="steamInput">Ссылка на профиль Steam</label>
        <input
          class="profile-input"
          id="steamInput"
          name="steamInput"
          type="text"
          inputmode="url"
          placeholder="Enter your Steam profile link"
          aria-describedby="statusText"
        >
        <button class="profile-submit" type="submit">Enter</button>
      </form>

      <section class="profile-history" id="profileHistory" aria-labelledby="historyHeading" hidden>
        <h2 class="visually-hidden" id="historyHeading">История поиска</h2>
        <div class="history-list" id="historyList"></div>
      </section>

      <div class="tabs" role="tablist" aria-label="Сайты для проверки профиля">
        <button class="tab" id="tab-leetify" type="button" role="tab" aria-selected="false" aria-controls="sitePanel" data-site="leetify">
          leetify.com
        </button>
        <button class="tab" id="tab-csst" type="button" role="tab" aria-selected="false" aria-controls="sitePanel" data-site="csst">
          csst.at
        </button>
        <button class="tab" id="tab-csrep" type="button" role="tab" aria-selected="false" aria-controls="sitePanel" data-site="csrep">
          csrep.gg
        </button>
        <button class="tab" id="tab-fastgg" type="button" role="tab" aria-selected="false" aria-controls="sitePanel" data-site="fastgg">
          fastgg.pro
        </button>
      </div>

      <section class="site-panel" id="sitePanel" role="tabpanel" aria-label="Встроенный просмотр выбранного сайта">
        <div class="frame-placeholder" id="framePlaceholder">There will be rendered selected site</div>
        <iframe
          class="site-frame"
          id="siteFrame"
          title="Встроенный просмотр сайта"
          referrerpolicy="no-referrer"
          hidden
        ></iframe>
      </section>

      <p class="status" id="statusText" role="status">Enter your Steam profile and press Enter.</p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
